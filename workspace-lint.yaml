project:
  name: "slideforge-rust"
  type: "rust-cli-tool"

structure:
  canonical:
    - path: "src"
      purpose: "All Rust source code (components, layouts, validators, dataviz, CLI)"
    - path: "scripts"
      purpose: "Utility scripts — workspace_lint.py, test helpers"
    - path: "docs"
      purpose: "Documentation, design guides, implementation plans"
    - path: "docs/superpowers/plans"
      purpose: "Implementation plans for features and bug fixes (YYYY-MM-DD-name.md)"
    - path: "test-drafts"
      purpose: "Auto-generated HTML carousel test outputs for visual regression review"
    - path: "dist"
      purpose: "Generated carousel HTML and exported PNG slide images (gitignored)"
    - path: "skills"
      purpose: "SlideForge skill definition installable alongside the binary"
    - path: "_kernel"
      purpose: "Internal kernel data and token definitions used by the renderer"

rules:
  root:
    allowed_root_files:
      - "README.md"
      - "AGENTS.md"
      - "AUDIT-REPORT.md"
      - "DESIGN-GUIDE.md"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".gitignore"
      - "workspace-lint.yaml"
      - "test_full_scope_rust.py"
      - "test_tokens.json"
      # Generator scripts: top-level entry points, intentional
      - "generate_*.py"
      # Token/slide JSON files: auto-generated by the CLI, live at root by convention
      - "*.json"
    forbidden_files:
      # Stale leak investigation dirs — hard error
      - "leakwork*"
      - "leak-scan*"
      - "nonexistent*"

  files:
    "*.py":
      preferred_dir: "scripts"
      exceptions:
        - "generate_*.py"
        - "test_full_scope_rust.py"
    "*.md":
      preferred_dir: "docs"
      exceptions:
        - "README.md"
        - "AGENTS.md"
        - "AUDIT-REPORT.md"
        - "DESIGN-GUIDE.md"
        # Skill-internal markdown is intentionally inside skills/
        - "skills/**/*.md"
        # Kernel intent/ledger docs live in _kernel/ by design
        - "_kernel/*.md"
    "*.json":
      preferred_dir: "_kernel"
      exceptions:
        - "Cargo.lock"

  directories:
    forbidden_patterns:
      - "^leakwork"
      - "^leak-scan"
      - "^nonexistent"
    warn_patterns:
      # Prefer canonical 'skills/' not the bare 'skill/' alias
      - "^skill$"

  git:
    check_tracked_but_ignored: true
